<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Weather Insight</title>
<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    font-family:Segoe UI,Arial,sans-serif;
    background:#fff;
    overflow:hidden;
}
#app{
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    position:relative;
    text-align:center;
}
#debug{
    position:absolute;
    top:6px;
    right:6px;
    width:22px;
    height:22px;
    border:none;
    background:#eee;
    border-radius:4px;
    cursor:pointer;
    font-size:12px;
}
#emoji{
    font-size:68px;
    line-height:1;
}
#temp{
    font-size:38px;
    font-weight:700;
    line-height:1.1;
}
#city{
    font-size:15px;
    color:#666;
    margin-top:2px;
}
#message{
    padding:16px;
    font-size:16px;
    text-align:center;
}
</style>
</head>
<body>
<div id="app">
    <button id="debug">🐞</button>
    <div id="emoji"></div>
    <div id="temp"></div>
    <div id="city"></div>
    <div id="message" style="display:none;"></div>
</div>

<script>
let debugData={
    geocodingUrl:"",
    geocodingResponse:null,
    weatherUrl:"",
    weatherResponse:null
};

function streetWithoutNumber(street){
    if(!street)return"";
    return street.replace(/\s+\d+.*$/,"").trim();
}

function emoji(temp){
    if(temp>=40)return"🙏";
    if(temp>=35)return"🌋";
    if(temp>=31)return"🔥";
    if(temp>=25)return"☀️";
    if(temp>=15)return"🥳";
    if(temp>=0)return"😳";
    return"🧊";
}

function showFallback(){
    document.getElementById("emoji").style.display="none";
    document.getElementById("temp").style.display="none";
    document.getElementById("city").style.display="none";
    const m=document.getElementById("message");
    m.style.display="block";
    m.textContent="Nur Gott kennt das Schicksahl 💫";
}

async function loadWeather(contact){
    const addr=contact.personal?.address||{};
    let search=addr.city?.trim();

    if(!search){
        search=streetWithoutNumber(addr.street||"");
    }

    if(!search){
        showFallback();
        return;
    }

    debugData.geocodingUrl=`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(search)}`;

    const geoRes=await fetch(debugData.geocodingUrl);
    const geoJson=await geoRes.json();

    debugData.geocodingResponse=geoJson;

    if(!geoJson.results||!geoJson.results.length){
        showFallback();
        return;
    }

    const place=geoJson.results[0];

    debugData.weatherUrl=`https://api.open-meteo.com/v1/forecast?latitude=${place.latitude}&longitude=${place.longitude}&daily=temperature_2m_max&forecast_days=1&timezone=auto`;

    const weatherRes=await fetch(debugData.weatherUrl);
    const weatherJson=await weatherRes.json();

    debugData.weatherResponse=weatherJson;

    const temp=weatherJson.daily.temperature_2m_max[0];

    document.getElementById("emoji").textContent=emoji(temp);
    document.getElementById("temp").textContent=Math.round(temp)+"°";
    document.getElementById("city").textContent=place.name;
}

document.getElementById("debug").onclick=()=>{
    const text=
`=== Geocoding URL ===
${debugData.geocodingUrl}

=== Geocoding Response ===
${JSON.stringify(debugData.geocodingResponse,null,2)}

=== Weather URL ===
${debugData.weatherUrl}

=== Weather Response ===
${JSON.stringify(debugData.weatherResponse,null,2)}`;

    window.parent.postMessage({
        type:"copyText",
        value:text
    },"*");
};

window.addEventListener("message",event=>{
    const contact=event.data.contact;

    if(!contact){
        showFallback();
        return;
    }

    loadWeather(contact).catch(showFallback);
});
</script>
</body>
</html>
