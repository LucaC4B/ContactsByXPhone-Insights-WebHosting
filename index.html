<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pizza Insights</title>
<style>
  :root {
    --rosso: #c0392b;
    --rosso-dark: #962d22;
    --verde: #2e7d4f;
    --verde-dark: #235f3d;
    --beige: #faf3e6;
    --beige-dark: #f0e3c8;
    --crosta: #8a5a2b;
    --text-dark: #3a2c1a;
    --text-muted: #7c6a52;
    --shadow: rgba(58, 44, 26, 0.12);
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow-x: hidden;
  }

  body {
    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(180deg, var(--beige) 0%, var(--beige-dark) 100%);
    color: var(--text-dark);
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    font-size: 14px;
  }

  /* Kopfbereich */
  .header {
    background: linear-gradient(135deg, var(--rosso) 0%, var(--rosso-dark) 100%);
    color: #fff;
    padding: 14px 16px 12px;
    position: relative;
    overflow: hidden;
  }

  .header::after {
    content: "";
    position: absolute;
    right: -20px;
    top: -20px;
    width: 90px;
    height: 90px;
    background: radial-gradient(circle at 30% 30%, #e0b04a 0%, #c0392b 70%);
    border-radius: 50%;
    opacity: 0.18;
  }

  .header-row {
    display: flex;
    align-items: center;
    gap: 10px;
    position: relative;
    z-index: 1;
  }

  .pizza-icon {
    font-size: 26px;
    line-height: 1;
    flex-shrink: 0;
  }

  .header-titles {
    flex: 1;
    min-width: 0;
  }

  .customer-name {
    font-size: 17px;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .header-sub {
    font-size: 11px;
    opacity: 0.85;
    margin-top: 1px;
  }

  /* Inhaltsbereich */
  .content {
    flex: 1;
    padding: 12px 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .card {
    background: #fff;
    border-radius: 10px;
    padding: 10px 12px;
    box-shadow: 0 2px 6px var(--shadow);
    border-left: 4px solid var(--verde);
  }

  .card-label {
    font-size: 10.5px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--verde-dark);
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .card-value {
    font-size: 14px;
    color: var(--text-dark);
    word-break: break-word;
  }

  /* Telefon-Karte mit Aktion */
  .action-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .call-btn {
    background: var(--verde);
    color: #fff;
    border: none;
    border-radius: 999px;
    padding: 7px 14px;
    font-size: 12.5px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    flex-shrink: 0;
    transition: background 0.15s ease, transform 0.1s ease;
  }

  .call-btn:hover {
    background: var(--verde-dark);
  }

  .call-btn:active {
    transform: scale(0.96);
  }

  /* Bestellverlauf */
  .orders-section {
    margin-top: 2px;
  }

  .section-title {
    font-size: 12px;
    font-weight: 700;
    color: var(--rosso-dark);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .order-card {
    background: #fff;
    border-radius: 10px;
    padding: 9px 12px;
    margin-bottom: 8px;
    box-shadow: 0 2px 6px var(--shadow);
    border-left: 4px solid var(--crosta);
  }

  .order-card:last-child {
    margin-bottom: 0;
  }

  .order-date {
    font-size: 10.5px;
    color: var(--text-muted);
    font-weight: 600;
    margin-bottom: 3px;
  }

  .order-items {
    font-size: 13.5px;
    color: var(--text-dark);
    line-height: 1.4;
  }

  /* Platzhalter / Leerzustand */
  .placeholder {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 30px 20px;
    color: var(--text-muted);
    gap: 8px;
  }

  .placeholder-icon {
    font-size: 40px;
    opacity: 0.5;
  }

  .placeholder-text {
    font-size: 13px;
    max-width: 220px;
  }

  .hidden {
    display: none !important;
  }

  /* Refresh-Hinweis (dezent) */
  .refresh-hint {
    text-align: center;
    font-size: 10px;
    color: var(--text-muted);
    padding: 4px 0 2px;
    opacity: 0.7;
  }
</style>
</head>
<body>

  <!-- Leerzustand: wird angezeigt, solange kein Kontakt geladen wurde -->
  <div id="placeholder" class="placeholder">
    <div class="placeholder-icon">🍕</div>
    <div class="placeholder-text">Sobald ein Kontakt ausgewählt wird, erscheinen hier die Bestelldaten.</div>
  </div>

  <!-- Hauptansicht: wird erst befüllt, wenn Kontaktdaten eintreffen -->
  <div id="panel" class="hidden">
    <div class="header">
      <div class="header-row">
        <div class="pizza-icon">🍕</div>
        <div class="header-titles">
          <div class="customer-name" id="customerName">—</div>
          <div class="header-sub">Pizza Express &middot; Kundenübersicht</div>
        </div>
      </div>
    </div>

    <div class="content">

      <!-- Telefon -->
      <div class="card" id="phoneCard">
        <div class="card-label">📞 Telefonnummer</div>
        <div class="action-row">
          <div class="card-value" id="phoneValue">—</div>
          <button class="call-btn" id="callBtn" type="button">📞 Anrufen</button>
        </div>
      </div>

      <!-- Adresse -->
      <div class="card" id="addressCard">
        <div class="card-label">🛵 Lieferadresse</div>
        <div class="card-value" id="addressValue">—</div>
      </div>

      <!-- Bestellverlauf -->
      <div class="orders-section" id="ordersSection">
        <div class="section-title">🧾 Letzte Bestellungen</div>
        <div id="ordersList"></div>
      </div>

    </div>

    <div class="refresh-hint">Kontaktdaten werden automatisch aktualisiert</div>
  </div>

<script>
  (function () {
    var placeholderEl = document.getElementById('placeholder');
    var panelEl = document.getElementById('panel');

    var customerNameEl = document.getElementById('customerName');

    var phoneCardEl = document.getElementById('phoneCard');
    var phoneValueEl = document.getElementById('phoneValue');
    var callBtn = document.getElementById('callBtn');

    var addressCardEl = document.getElementById('addressCard');
    var addressValueEl = document.getElementById('addressValue');

    var ordersSectionEl = document.getElementById('ordersSection');
    var ordersListEl = document.getElementById('ordersList');

    var currentPhone = null;

    function showPlaceholder() {
      placeholderEl.classList.remove('hidden');
      panelEl.classList.add('hidden');
    }

    function showPanel() {
      placeholderEl.classList.add('hidden');
      panelEl.classList.remove('hidden');
    }

    function setHidden(el, hidden) {
      if (hidden) {
        el.classList.add('hidden');
      } else {
        el.classList.remove('hidden');
      }
    }

    function buildAddress(addr) {
      if (!addr) return '';
      var parts = [];
      if (addr.street) parts.push(addr.street);
      var cityLine = [addr.postalCode, addr.city].filter(Boolean).join(' ');
      if (cityLine) parts.push(cityLine);
      if (addr.country) parts.push(addr.country);
      return parts.join(', ');
    }

    function renderOrder(date, items) {
      var card = document.createElement('div');
      card.className = 'order-card';

      var dateEl = document.createElement('div');
      dateEl.className = 'order-date';
      dateEl.textContent = date;

      var itemsEl = document.createElement('div');
      itemsEl.className = 'order-items';
      itemsEl.textContent = items;

      card.appendChild(dateEl);
      card.appendChild(itemsEl);
      return card;
    }

    function renderContact(data) {
      if (!data || !data.contact) {
        showPlaceholder();
        return;
      }

      var contact = data.contact;
      var personal = contact.personal || {};
      var name = (personal.name && personal.name.displayName) ||
                 (personal.name && personal.name.fullName) || '';

      var phones = contact.phoneNumbers || {};
      var phone = '';
      if (phones.mobile) {
        phone = phones.mobile;
      } else if (phones.work && phones.work.length) {
        phone = phones.work[0];
      } else if (phones.home) {
        phone = phones.home;
      }

      var address = buildAddress(personal.address);

      var custom = contact.customFields || {};
      var order1Date = custom.custom1 || '';
      var order1Items = custom.custom2 || '';
      var order2Date = custom.custom3 || '';
      var order2Items = custom.custom4 || '';

      var hasAnyData = name || phone || address || order1Items || order2Items;

      if (!hasAnyData) {
        showPlaceholder();
        return;
      }

      showPanel();

      // Name
      customerNameEl.textContent = name || 'Unbekannter Kunde';

      // Telefon
      if (phone) {
        phoneValueEl.textContent = phone;
        currentPhone = phone;
        setHidden(phoneCardEl, false);
      } else {
        currentPhone = null;
        setHidden(phoneCardEl, true);
      }

      // Adresse
      if (address) {
        addressValueEl.textContent = address;
        setHidden(addressCardEl, false);
      } else {
        setHidden(addressCardEl, true);
      }

      // Bestellungen
      ordersListEl.innerHTML = '';
      var orderCount = 0;

      if (order1Items) {
        ordersListEl.appendChild(renderOrder(order1Date || 'Datum unbekannt', order1Items));
        orderCount++;
      }
      if (order2Items) {
        ordersListEl.appendChild(renderOrder(order2Date || 'Datum unbekannt', order2Items));
        orderCount++;
      }

      setHidden(ordersSectionEl, orderCount === 0);
    }

    // Eingehende Kontaktdaten empfangen
    window.addEventListener('message', function (event) {
      renderContact(event.data);
    });

    // Anruf-Button
    callBtn.addEventListener('click', function () {
      if (!currentPhone) return;
      window.parent.postMessage({ type: 'callPhoneNumber', value: currentPhone }, '*');
    });

    // Beim Laden initial nach Daten fragen (z.B. nach Seitenwechsel im iFrame)
    window.parent.postMessage({ type: 'refresh' }, '*');
  })();
</script>

</body>
</html>
