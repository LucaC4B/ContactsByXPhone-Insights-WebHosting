<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offene Tickets</title>
<style>
  :root {
    --bg: #0f1419;
    --surface: #161d26;
    --line: #243140;
    --text: #e8eef5;
    --muted: #7d8da0;
    --accent: #4da3ff;
    --warn: #f0a13c;
    --zero: #3fb27f;
    --hot: #ff5d6c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 16px 18px 14px;
    position: relative;
  }
 
  .top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
    flex: 0 0 auto;
  }
  .eyebrow {
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 600;
  }
  .contact-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-top: 3px;
    line-height: 1.2;
    max-width: 200px;
  }
  .copy-btn {
    flex: 0 0 auto;
    appearance: none;
    background: var(--surface);
    border: 1px solid var(--line);
    color: var(--muted);
    border-radius: 7px;
    width: 30px; height: 30px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s ease;
  }
  .copy-btn:hover { color: var(--text); border-color: var(--accent); }
  .copy-btn:active { transform: translateY(1px); }
  .copy-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .copy-btn svg { width: 14px; height: 14px; }
 
  .stage {
    flex: 1 1 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 0;
    text-align: center;
  }
 
  .count {
    font-size: 88px;
    font-weight: 800;
    line-height: 0.9;
    letter-spacing: -0.03em;
    color: var(--accent);
    font-variant-numeric: tabular-nums;
    opacity: 0;
    transform: translateY(8px);
    animation: pop .45s cubic-bezier(.2,.8,.2,1) forwards;
  }
  .count.zero { color: var(--zero); }
  .count.hot { color: var(--hot); }
  @keyframes pop { to { opacity: 1; transform: translateY(0); } }
  @media (prefers-reduced-motion: reduce) {
    .count { animation: none; opacity: 1; transform: none; }
  }
  .count-label {
    font-size: 12px;
    letter-spacing: 0.04em;
    color: var(--muted);
    margin-top: 10px;
    max-width: 240px;
    line-height: 1.4;
  }
  .count-label b { color: var(--text); font-weight: 600; }
 
  .msg {
    max-width: 240px;
    color: var(--muted);
    font-size: 12.5px;
    line-height: 1.5;
  }
  .msg .icon {
    width: 30px; height: 30px;
    margin: 0 auto 10px;
    color: var(--line);
  }
  .msg .icon svg { width: 100%; height: 100%; }
  .msg .headline {
    color: var(--text);
    font-weight: 600;
    font-size: 13px;
    margin-bottom: 4px;
  }
  .msg.warn .icon { color: var(--warn); }
 
  .hidden { display: none !important; }
</style>
</head>
<body>
 
  <div class="top">
<div>
<div class="eyebrow">Offene Tickets</div>
<div class="contact-name" id="contactName"></div>
</div>
<button class="copy-btn" id="copyLog" title="Debug-Protokoll kopieren" aria-label="Debug-Protokoll kopieren">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
<rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/>
</svg>
</button>
</div>
 
  <div class="stage" id="stage"></div>
 
<script>
(function () {
  "use strict";
 
  const log = { input: null, received: [], sent: [] };
 
  function send(msg) {
    log.sent.push({ t: new Date().toISOString(), msg });
    try { window.parent.postMessage(msg, "*"); } catch (e) {}
  }
 
  const stage = document.getElementById("stage");
  const nameEl = document.getElementById("contactName");
 
  function esc(s) {
    return String(s == null ? "" : s).replace(/[&<>"]/g, c =>
      ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
  }
 
  function contactDisplayName(contact) {
    try {
      const n = contact.personal && contact.personal.name;
      if (n) return n.displayName || n.fullName ||
        [n.firstName, n.lastName].filter(Boolean).join(" ");
    } catch (e) {}
    return "";
  }
 
  const ICON_LOCK =
    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="11" width="16" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>';
  const ICON_WARN =
    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3 2 20h20L12 3z"/><line x1="12" y1="10" x2="12" y2="14"/><circle cx="12" cy="17.5" r="0.6" fill="currentColor"/></svg>';
  const ICON_EMPTY =
    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M8 12h8"/></svg>';
 
  function showMessage(headline, body, opts) {
    opts = opts || {};
    nameEl.textContent = opts.name || "";
    stage.innerHTML =
      '<div class="msg' + (opts.warn ? ' warn' : '') + '">' +
        '<div class="icon">' + (opts.icon || ICON_EMPTY) + '</div>' +
        '<div class="headline">' + esc(headline) + '</div>' +
        '<div>' + esc(body) + '</div>' +
      '</div>';
  }
 
  function showCount(n, name) {
    nameEl.textContent = name || "";
    const cls = n === 0 ? "zero" : (n >= 5 ? "hot" : "");
    const sub = n === 0
      ? "Keine offenen Vorg\u00e4nge f\u00fcr diesen Kontakt."
      : "<b>" + esc(name || "Dieser Kontakt") + "</b> hat aktuell " +
        (n === 1 ? "ein offenes Ticket." : n + " offene Tickets.");
    stage.innerHTML =
      '<div class="count ' + cls + '">' + n + '</div>' +
      '<div class="count-label">' + sub + '</div>';
  }
 
  function isSales(dept) {
    return typeof dept === "string" && dept.trim().toLowerCase() === "sales";
  }
 
  function parseTickets(raw) {
    if (raw == null) return null;
    const s = String(raw).trim();
    if (s === "") return null;
    const n = Number(s);
    if (!Number.isFinite(n) || n < 0) return null;
    return Math.round(n);
  }
 
  function render(contact, user) {
    const name = contactDisplayName(contact);
 
    const dept = user && user.department;
    if (dept === undefined || dept === null || String(dept).trim() === "") {
      showMessage(
        "Abteilung nicht verf\u00fcgbar",
        "Die Abteilung des Benutzers wird nicht mitgeliefert. Die Ticketanzeige ist nur f\u00fcr Sales vorgesehen.",
        { warn: true, icon: ICON_WARN, name: name }
      );
      return;
    }
    if (!isSales(dept)) {
      showMessage(
        "Nur f\u00fcr Sales",
        "Diese Ansicht ist Mitarbeitenden der Abteilung Sales vorbehalten.",
        { icon: ICON_LOCK, name: name }
      );
      return;
    }
 
    const raw = contact && contact.customFields && contact.customFields.custom1;
    const tickets = parseTickets(raw);
    if (tickets === null) {
      showMessage(
        "Keine Ticketdaten",
        "F\u00fcr diesen Kontakt liegt keine Ticketanzahl vor.",
        { icon: ICON_EMPTY, name: name }
      );
      return;
    }
 
    showCount(tickets, name);
  }
 
  window.addEventListener("message", event => {
    const data = event.data || {};
    log.received.push({ t: new Date().toISOString(), data });
    if (!data.contact && !data.user) return;
    log.input = data;
    render(data.contact || {}, data.user || {});
  });
 
  document.getElementById("copyLog").addEventListener("click", () => {
    send({ type: "copyText", value: JSON.stringify(log, null, 2) });
  });
 
  send({ type: "refresh" });
})();
</script>
</body>
</html>
