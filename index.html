<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontakt Dashboard</title>
    <style>
        :root {
            --bg: #f4f6f9;
            --card-bg: #ffffff;
            --accent: #0a6ed1;
            --accent-soft: #e8f1fb;
            --success: #16a34a;
            --text: #1c2733;
            --text-muted: #6a7888;
            --border: #e2e7ee;
            --shadow: 0 1px 3px rgba(20, 40, 70, 0.08);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #1a1f26;
                --card-bg: #232a33;
                --accent: #4a9eea;
                --accent-soft: #2a3744;
                --success: #34c759;
                --text: #e6ebf1;
                --text-muted: #97a3b3;
                --border: #323b46;
                --shadow: 0 1px 3px rgba(0, 0, 0, 0.3);
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .dashboard {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 18px;
            gap: 14px;
            overflow-y: auto;
        }

        /* --- Profil-Kopf --- */
        .profile {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .avatar {
            flex-shrink: 0;
            width: 64px;
            height: 64px;
            border-radius: 50%;
            object-fit: cover;
            background: var(--accent-soft);
            color: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 700;
            text-transform: uppercase;
            border: 2px solid var(--border);
        }

        .profile-info {
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .profile-name {
            font-size: 18px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .profile-sub {
            font-size: 13px;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* --- Karten --- */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: var(--shadow);
        }

        .ticket-card {
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .ticket-icon {
            flex-shrink: 0;
            width: 52px;
            height: 52px;
            border-radius: 12px;
            background: var(--accent-soft);
            color: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ticket-icon svg { width: 26px; height: 26px; }

        .ticket-label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.6px;
            font-weight: 600;
        }

        .ticket-count {
            font-size: 40px;
            font-weight: 700;
            line-height: 1.1;
        }

        /* --- Aktionen --- */
        .actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            flex: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: none;
            border-radius: 10px;
            padding: 13px 16px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: filter 0.15s, opacity 0.15s;
        }

        .btn svg { width: 18px; height: 18px; }

        .btn-call {
            background: var(--success);
            color: #fff;
        }

        .btn-call:hover { filter: brightness(1.08); }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* --- Karte / Maps --- */
        .map-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 220px;
        }

        .map-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 14px;
            font-size: 13px;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
        }

        .map-header svg { width: 16px; height: 16px; flex-shrink: 0; }

        .map-frame-wrap {
            flex: 1;
            position: relative;
            min-height: 200px;
        }

        .map-frame-wrap iframe {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: 0;
            border-radius: 0 0 12px 12px;
        }

        .map-empty {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 13px;
            padding: 24px;
            text-align: center;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="dashboard">

        <!-- Profil -->
        <div class="profile">
            <div class="avatar" id="avatar">?</div>
            <div class="profile-info">
                <span class="profile-name" id="profileName">Kein Kontakt geladen</span>
                <span class="profile-sub" id="profileSub"></span>
            </div>
        </div>

        <!-- Tickets -->
        <div class="card ticket-card">
            <div class="ticket-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 9V5a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v4a2 2 0 0 0 0 4v4a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-4a2 2 0 0 0 0-4z"></path>
                    <path d="M9 7v10"></path>
                </svg>
            </div>
            <div>
                <div class="ticket-label">Eroeffnete Tickets</div>
                <div class="ticket-count" id="ticketCount">--</div>
            </div>
        </div>

        <!-- Aktionen -->
        <div class="actions">
            <button class="btn btn-call" id="callBtn" disabled>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"></path>
                </svg>
                <span id="callLabel">Anrufen</span>
            </button>
        </div>

        <!-- Google Maps -->
        <div class="card map-section">
            <div class="map-header">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                    <circle cx="12" cy="10" r="3"></circle>
                </svg>
                <span id="addressLabel">Keine Adresse verfuegbar</span>
            </div>
            <div class="map-frame-wrap" id="mapWrap">
                <iframe id="mapFrame" loading="lazy" referrerpolicy="no-referrer-when-downgrade" allowfullscreen></iframe>
            </div>
            <div class="map-empty hidden" id="mapEmpty">Fuer diesen Kontakt liegt keine Adresse vor.</div>
        </div>

    </div>

    <script>
        const els = {
            avatar: document.getElementById("avatar"),
            name: document.getElementById("profileName"),
            sub: document.getElementById("profileSub"),
            ticket: document.getElementById("ticketCount"),
            callBtn: document.getElementById("callBtn"),
            callLabel: document.getElementById("callLabel"),
            addressLabel: document.getElementById("addressLabel"),
            mapWrap: document.getElementById("mapWrap"),
            mapFrame: document.getElementById("mapFrame"),
            mapEmpty: document.getElementById("mapEmpty")
        };

        // Placeholder: zufaellige Anzahl bereits eroeffneter Tickets.
        function randomTicketCount() {
            return Math.floor(Math.random() * 50) + 1;
        }

        function pickName(a_contact) {
            const n = a_contact && a_contact.personal && a_contact.personal.name;
            if (!n) return "";
            return n.displayName || n.fullName ||
                   [n.firstName, n.lastName].filter(Boolean).join(" ");
        }

        function initials(a_name) {
            const parts = a_name.trim().split(/\s+/).filter(Boolean);
            if (parts.length === 0) return "?";
            if (parts.length === 1) return parts[0].charAt(0);
            return parts[0].charAt(0) + parts[parts.length - 1].charAt(0);
        }

        function renderProfile(a_contact) {
            const name = pickName(a_contact) || "Unbekannter Kontakt";
            els.name.textContent = name;

            const company = a_contact && a_contact.company;
            els.sub.textContent = company
                ? [company.employmentInfo, company.name].filter(Boolean).join(" - ")
                : "";

            const thumb = a_contact && a_contact.thumbnailUrl;
            if (thumb) {
                els.avatar.style.backgroundImage = `url("${thumb}")`;
                els.avatar.style.backgroundSize = "cover";
                els.avatar.style.backgroundPosition = "center";
                els.avatar.textContent = "";
            } else {
                els.avatar.textContent = initials(name);
            }
        }

        function pickPhoneNumber(a_contact) {
            const p = a_contact && a_contact.phoneNumbers;
            if (!p) return "";
            if (Array.isArray(p.work) && p.work.length > 0) return p.work[0];
            return p.mobile || p.home || "";
        }

        function renderCallButton(a_contact) {
            const number = pickPhoneNumber(a_contact);
            if (!number) {
                els.callBtn.disabled = true;
                els.callLabel.textContent = "Keine Nummer";
                return;
            }
            els.callBtn.disabled = false;
            els.callLabel.textContent = `Anrufen ${number}`;
            els.callBtn.onclick = () => {
                window.parent.postMessage({ type: "callPhoneNumber", value: number }, "*");
            };
        }

        function buildAddress(a_contact) {
            const c = a_contact || {};
            const company = c.company && c.company.address;
            const personal = c.personal && c.personal.address;
            const src = pickAddressSource(company, personal);
            if (!src) return "";
            return [src.street, src.postalCode, src.city, src.country]
                .filter(Boolean).join(", ");
        }

        function pickAddressSource(a_company, a_personal) {
            if (hasAddress(a_company)) return a_company;
            if (hasAddress(a_personal)) return a_personal;
            return null;
        }

        function hasAddress(a_addr) {
            return a_addr && (a_addr.street || a_addr.city || a_addr.postalCode);
        }

        function renderMap(a_contact) {
            const address = buildAddress(a_contact);
            if (!address) {
                els.addressLabel.textContent = "Keine Adresse verfuegbar";
                els.mapWrap.classList.add("hidden");
                els.mapEmpty.classList.remove("hidden");
                return;
            }
            els.addressLabel.textContent = address;
            els.mapWrap.classList.remove("hidden");
            els.mapEmpty.classList.add("hidden");
            els.mapFrame.src =
                `https://maps.google.com/maps?q=${encodeURIComponent(address)}&z=15&output=embed`;
        }

        function handleIncomingData(a_event) {
            const contact = a_event.data && a_event.data.contact;
            if (!contact) return;
            renderProfile(contact);
            renderCallButton(contact);
            renderMap(contact);
            els.ticket.textContent = randomTicketCount();
        }

        window.addEventListener("message", handleIncomingData);

        // Startwert fuer die Ticket-Anzeige, bis Daten eintreffen.
        els.ticket.textContent = randomTicketCount();
    </script>
</body>
</html>
