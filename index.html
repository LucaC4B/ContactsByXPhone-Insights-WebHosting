<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wetter Insights</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    overflow: hidden;
  }

  .widget {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    width: 100%;
    height: 100%;
    padding: 12px;
    text-align: center;
  }

  .emoji {
    font-size: clamp(48px, 14vw, 80px);
    line-height: 1;
    margin-bottom: 4px;
    display: block;
  }

  .temp {
    font-size: clamp(32px, 10vw, 56px);
    font-weight: 700;
    line-height: 1;
    color: #1a1a1a;
    letter-spacing: -1px;
    margin-bottom: 4px;
  }

  .city {
    font-size: clamp(11px, 3.5vw, 15px);
    color: #666;
    font-weight: 400;
    letter-spacing: 0.02em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 90%;
  }

  .loading {
    font-size: 13px;
    color: #999;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .spinner {
    width: 20px;
    height: 20px;
    border: 2px solid #e0e0e0;
    border-top-color: #999;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .fallback {
    font-size: clamp(12px, 3.5vw, 15px);
    color: #888;
    text-align: center;
    padding: 8px;
    line-height: 1.5;
  }

  @media (prefers-color-scheme: dark) {
    .temp { color: #f0f0f0; }
    .city { color: #aaa; }
    .loading { color: #777; }
    .fallback { color: #777; }
    .spinner { border-color: #444; border-top-color: #888; }
  }
</style>
</head>
<body>
<div class="widget" id="widget">
  <div class="loading">
    <div class="spinner"></div>
    <span>Standort wird ermittelt…</span>
  </div>
</div>

<script>
function getEmoji(temp) {
  if (temp > 40) return '🙏';
  if (temp >= 35) return '🌋';
  if (temp >= 31) return '🔥';
  if (temp >= 25) return '☀️';
  if (temp >= 15) return '🥳';
  if (temp >= 0)  return '😳';
  return '🧊';
}

function render(emoji, temp, city) {
  const w = document.getElementById('widget');
  w.innerHTML = `
    <span class="emoji">${emoji}</span>
    <span class="temp">${Math.round(temp)}°</span>
    <span class="city">${city}</span>
  `;
}

function renderFallback() {
  document.getElementById('widget').innerHTML =
    '<div class="fallback">Nur Gott kennt das Schicksahl 💫</div>';
}

async function getCityName(lat, lon) {
  try {
    const r = await fetch(
      `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&accept-language=de`,
      { headers: { 'Accept-Language': 'de' } }
    );
    const d = await r.json();
    return d.address?.city
      || d.address?.town
      || d.address?.village
      || d.address?.county
      || d.address?.state
      || 'Unbekannt';
  } catch {
    return 'Unbekannt';
  }
}

async function getWeather(lat, lon) {
  const today = new Date().toISOString().split('T')[0];
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max&timezone=auto&start_date=${today}&end_date=${today}`;
  const r = await fetch(url);
  const d = await r.json();
  return d.daily?.temperature_2m_max?.[0];
}

async function init() {
  let lat, lon, city;

  // Try XPhone contact address first
  let contactLat = null, contactLon = null;

  window.addEventListener('message', async (event) => {
    const contact = event.data?.contact;
    const addr = contact?.company?.address || contact?.personal?.address;
    if (addr?.city) {
      try {
        const gc = await fetch(
          `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(
            [addr.street, addr.postalCode, addr.city, addr.country].filter(Boolean).join(', ')
          )}&format=json&limit=1`
        );
        const gd = await gc.json();
        if (gd[0]) {
          contactLat = parseFloat(gd[0].lat);
          contactLon = parseFloat(gd[0].lon);
          city = addr.city;
          const temp = await getWeather(contactLat, contactLon);
          if (temp != null) render(getEmoji(temp), temp, city);
          else renderFallback();
        }
      } catch { renderFallback(); }
    }
  });

  // Fallback: browser geolocation
  if (!navigator.geolocation) { renderFallback(); return; }

  navigator.geolocation.getCurrentPosition(async (pos) => {
    // If contact data already handled it, skip
    if (contactLat !== null) return;

    lat = pos.coords.latitude;
    lon = pos.coords.longitude;

    try {
      [city] = await Promise.all([getCityName(lat, lon)]);
      const temp = await getWeather(lat, lon);
      if (temp == null) { renderFallback(); return; }
      render(getEmoji(temp), temp, city);
    } catch { renderFallback(); }

  }, () => {
    // Geolocation denied
    setTimeout(() => {
      if (!document.querySelector('.emoji')) renderFallback();
    }, 2000);
  }, { timeout: 8000 });
}

init();
</script>
</body>
</html>
