<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Weather Insight</title>
<style>
html,body{
margin:0;
width:100%;
height:100%;
font-family:Arial,sans-serif;
background:#fff;
overflow:hidden;
}
#app{
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
position:relative;
}
#debug{
position:absolute;
top:6px;
right:6px;
border:none;
background:#f3f3f3;
border-radius:6px;
padding:4px 8px;
cursor:pointer;
font-size:11px;
}
#content{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
gap:4px;
}
#emoji{
font-size:72px;
line-height:1;
}
#temp{
font-size:42px;
font-weight:700;
line-height:1;
}
#city{
font-size:16px;
opacity:.7;
line-height:1.2;
max-width:90%;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}
</style>
</head>
<body>
<div id="app">
<button id="debug">Debug</button>
<div id="content">
<div id="emoji">💫</div>
<div id="temp">--°</div>
<div id="city">Nur Gott kennt das Schicksahl 💫</div>
</div>
</div>

<script>
let lastResponse=null;

function getEmoji(temp){
if(temp>=40)return"🙏";
if(temp>=35)return"🌋";
if(temp>=31)return"🔥";
if(temp>=25)return"☀️";
if(temp>=15)return"🥳";
if(temp>=0)return"😳";
return"🧊";
}

function sendCopy(text){
window.parent.postMessage({type:"copyText",value:text},"*");
}

document.getElementById("debug").addEventListener("click",()=>{
sendCopy(JSON.stringify(lastResponse||{error:"Keine Daten"},null,2));
});

async function loadWeather(contact){
try{
const parts=[
contact?.personal?.address?.city,
contact?.company?.address?.city,
contact?.personal?.address?.country,
contact?.company?.address?.country
].filter(Boolean);

const query=parts.join(" ").trim();

if(!query){
document.getElementById("city").textContent="Nur Gott kennt das Schicksahl 💫";
return;
}

const geoRes=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=1&language=de&format=json`);
const geo=await geoRes.json();

if(!geo.results?.length){
document.getElementById("city").textContent="Nur Gott kennt das Schicksahl 💫";
return;
}

const place=geo.results[0];

const weatherRes=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${place.latitude}&longitude=${place.longitude}&daily=temperature_2m_max&forecast_days=1&timezone=auto`);
const weather=await weatherRes.json();

lastResponse={
location:place,
weather
};

const temp=Math.round(weather?.daily?.temperature_2m_max?.[0]);

if(Number.isNaN(temp)){
document.getElementById("city").textContent="Nur Gott kennt das Schicksahl 💫";
return;
}

document.getElementById("emoji").textContent=getEmoji(temp);
document.getElementById("temp").textContent=temp+"°";
document.getElementById("city").textContent=place.name||query;
}catch{
document.getElementById("city").textContent="Nur Gott kennt das Schicksahl 💫";
}
}

window.addEventListener("message",event=>{
const contact=event.data?.contact||{};
loadWeather(contact);
});
</script>
</body>
</html>
