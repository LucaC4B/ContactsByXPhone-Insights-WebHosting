<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Insights Panel</title>
<style>
html,body{
margin:0;
padding:0;
width:100%;
height:100%;
background:#0b0b0b;
font-family:Arial, sans-serif;
color:#fff;
overflow:hidden;
}
#app{
width:100%;
height:100%;
position:relative;
}
#topbar{
position:absolute;
top:0;
right:0;
padding:10px;
z-index:10;
}
button{
background:#222;
color:#fff;
border:0;
padding:6px 10px;
cursor:pointer;
font-size:12px;
}
#grill{
position:absolute;
bottom:0;
width:100%;
height:40%;
background:#111;
display:flex;
align-items:center;
justify-content:center;
}
#grill.on{
background:radial-gradient(#333,#000);
}
#plate{
width:200px;
height:20px;
background:#444;
border-radius:10px;
position:relative;
}
#contactImg{
width:80px;
height:80px;
border-radius:50%;
position:absolute;
top:-70px;
left:50%;
transform:translateX(-50%);
object-fit:cover;
}
.sizzle{
animation:sizzle 0.2s infinite alternate;
}
@keyframes sizzle{
0%{transform:translateX(-50%) rotate(-2deg)}
100%{transform:translateX(-50%) rotate(2deg)}
}
.flip{
animation:flip 2s infinite;
}
@keyframes flip{
0%{transform:translateX(-50%) rotateY(0deg)}
50%{transform:translateX(-50%) rotateY(180deg)}
100%{transform:translateX(-50%) rotateY(360deg)}
}
#info{
position:absolute;
top:20px;
left:20px;
right:20px;
font-size:14px;
line-height:1.4;
}
</style>
</head>
<body>
<div id="app">
<div id="topbar">
<button onclick="copyAll()">Copy</button>
</div>
<div id="info"></div>
<div id="grill">
<div id="plate">
<img id="contactImg" src="" />
</div>
</div>
</div>
<script>
let lastEvent=null
let logs=[]
let contactData=null
let userData=null
let heat=0

window.addEventListener('message', async event=>{
logs.push(event.data)
contactData=event.data.contact
userData=event.data.user
await run()
})

async function run(){
if(!contactData)return
let cities=[]
if(contactData.personal&&contactData.personal.address&&contactData.personal.address.city)cities.push(contactData.personal.address.city)
if(contactData.company&&contactData.company.address&&contactData.company.address.city)cities.push(contactData.company.address.city)
cities=cities.filter(Boolean)

let temp=null
let lat=null
let lon=null

for(let city of cities){
try{
let geo=await fetch('https://geocoding-api.open-meteo.com/v1/search?name='+encodeURIComponent(city))
let g=await geo.json()
if(g&&g.results&&g.results.length){
lat=g.results[0].latitude
lon=g.results[0].longitude
let w=await fetch('https://api.open-meteo.com/v1/forecast?latitude='+lat+'&longitude='+lon+'&daily=temperature_2m_max&timezone=auto')
let wj=await w.json()
if(wj&&wj.daily&&wj.daily.temperature_2m_max){
temp=Math.max(...wj.daily.temperature_2m_max)
break
}
}
}catch(e){}
}

let grill=document.getElementById('grill')
let img=document.getElementById('contactImg')
let info=document.getElementById('info')

if(!temp){
grill.classList.remove('on')
img.src=contactData.thumbnailUrl||''
info.innerText='No data'
return
}

grill.classList.add('on')
img.src=contactData.thumbnailUrl||''

let level='rare'
if(temp>=40)level='well done'
else if(temp>=30)level='medium well'
else if(temp>=17)level='medium'

heat=temp
info.innerText='Heat: '+temp+'° - '+level

img.classList.add('sizzle')
img.classList.add('flip')
}

function copyAll(){
let payload={
type:'copyText',
value:JSON.stringify({logs:logs,contact:contactData,user:userData})
}
navigator.clipboard.writeText(JSON.stringify(payload))
}
</script>
</body>
</html>
